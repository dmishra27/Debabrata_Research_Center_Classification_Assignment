version: "3.9"

services:
  classifier:
    build: .
    container_name: research_centre_classifier
    ports:
      - "8000:8000"
    env_file:
      - .env.draft
    volumes:
      - ./model_bundle.pkl:/app/model_bundle.pkl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
